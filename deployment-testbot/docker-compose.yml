name: immich-testbot

services:
  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    command: >
      -c fsync=off
      -c shared_preload_libraries=vchord.so
      -c config_file=/var/lib/postgresql/data/postgresql.conf
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: immich
    volumes:
      - db-data:/var/lib/postgresql/data
    shm_size: 128mb
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d immich']
      interval: 1s
      timeout: 5s
      retries: 30
      start_period: 10s

  redis:
    image: docker.io/valkey/valkey:8
    healthcheck:
      test: redis-cli ping || exit 1

  immich-server:
    build:
      context: ${UPSTREAM_CHECKOUT:-..}
      dockerfile: server/Dockerfile
      args:
        - BUILD_ID=1234567890
        - BUILD_IMAGE=e2e
        - BUILD_SOURCE_REF=e2e
        - BUILD_SOURCE_COMMIT=e2eeeeeeeeeeeeeeeeee
    environment:
      DB_HOSTNAME: database
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: redis
      IMMICH_MACHINE_LEARNING_ENABLED: 'false'
      IMMICH_ENV: testing
      IMMICH_PORT: '2285'
      IMMICH_IGNORE_MOUNT_CHECK_ERRORS: 'true'
    volumes:
      - uploads:/usr/src/app/upload
    ports:
      - 2285:2285
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  db-data:
  uploads:
